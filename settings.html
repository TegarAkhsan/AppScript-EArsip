<div style="max-width: 800px; margin: 0 auto;">
    <!-- Profile Info -->
    <div class="flat-card" x-show="view === 'settings-profile'" x-transition style="width: 100%; max-width: none;">
        <div class="auth-header" style="text-align: left;">
            <h3>Profil Desa</h3>
            <p>Informasi dasar sistem</p>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="text" class="form-input" :value="user.email" readonly style="background: #f8fafc;">
        </div>
        <div class="form-group">
            <label>Nama Desa</label>
            <input type="text" class="form-input" x-model="settingsForm.namaDesa">
        </div>
        <div class="form-group">
            <label>Alamat Desa</label>
            <textarea class="form-input" x-model="settingsForm.alamatDesa" rows="3"></textarea>
        </div>
        <button class="btn btn-primary" @click="handleUpdateProfile" :disabled="loading">SIMPAN PERUBAHAN</button>
    </div>

    <!-- Change PIN -->
    <div class="flat-card" x-show="view === 'settings-pin'" x-transition style="width: 100%; max-width: none;">
        <div class="auth-header" style="text-align: left;">
            <h3>Ubah PIN</h3>
            <p>Amankan akses dengan PIN baru</p>
        </div>
        <div class="form-group" x-data="{ show: false }">
            <label>PIN Lama</label>
            <div style="position: relative;">
                <input :type="show ? 'text' : 'password'" class="form-input" x-model="securityForm.oldPin" maxlength="6" style="padding-right: 50px;">
                <button type="button" @click="show = !show" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); border: none; background: transparent; cursor: pointer; color: var(--text-light); transition: all 0.2s; display: flex; align-items: center; justify-content: center;" :style="show ? 'color: var(--primary);' : ''">
                    <i x-show="!show" data-lucide="eye" style="width: 20px; height: 20px;"></i>
                    <i x-show="show" data-lucide="eye-off" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
        </div>
        <div class="form-group" x-data="{ show: false }">
            <label>PIN Baru</label>
            <div style="position: relative;">
                <input :type="show ? 'text' : 'password'" class="form-input" x-model="securityForm.newPin" maxlength="6" style="padding-right: 50px;">
                <button type="button" @click="show = !show" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); border: none; background: transparent; cursor: pointer; color: var(--text-light); transition: all 0.2s; display: flex; align-items: center; justify-content: center;" :style="show ? 'color: var(--primary);' : ''">
                    <i x-show="!show" data-lucide="eye" style="width: 20px; height: 20px;"></i>
                    <i x-show="show" data-lucide="eye-off" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
        </div>
        <div class="form-group" x-data="{ show: false }">
            <label>Konfirmasi PIN Baru</label>
            <div style="position: relative;">
                <input :type="show ? 'text' : 'password'" class="form-input" x-model="securityForm.confirmPin" maxlength="6" style="padding-right: 50px;">
                <button type="button" @click="show = !show" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); border: none; background: transparent; cursor: pointer; color: var(--text-light); transition: all 0.2s; display: flex; align-items: center; justify-content: center;" :style="show ? 'color: var(--primary);' : ''">
                    <i x-show="!show" data-lucide="eye" style="width: 20px; height: 20px;"></i>
                    <i x-show="show" data-lucide="eye-off" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
        </div>
        <button class="btn btn-primary" @click="handleChangePin" :disabled="loading">UPDATE PIN</button>
    </div>
</div>
