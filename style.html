<style>
:root {
    --primary: #60712F; /* Sorrel */
    --primary-dark: #483C25; /* Walnut */
    --secondary: #9EA93F; /* Artichoke */
    --accent: #F4F08D; /* Cauliflower */
    --background: #121212;
    --surface: #1E1E1E;
    --text: #F1F5F9;
    --text-light: #94A3B8;
    --success: #9EA93F;
    --error: #ef4444;
    --warning: #F4F08D;
    --radius-sm: 8px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
    --glass: rgba(30, 30, 30, 0.8);
    --glass-border: rgba(255, 255, 255, 0.1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

body {
    background-color: var(--background);
    color: var(--text);
    overflow-x: hidden;
    min-height: 100vh;
}

/* Loading Overlay */
.loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(18, 18, 18, 0.8);
    backdrop-filter: blur(8px);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
}

.loader {
    width: 48px;
    height: 48px;
    border: 5px solid var(--primary);
    border-bottom-color: transparent;
    border-radius: 50%;
    animation: rotation 1s linear infinite;
}

@keyframes rotation {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Toast */
.toast-container {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 10000;
}

.toast {
    padding: 16px 24px;
    border-radius: var(--radius-md);
    color: white;
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    font-weight: 600;
    min-width: 250px;
}

.toast-success { background: var(--success); }
.toast-error { background: var(--error); }
.toast-info { background: var(--primary); }

/* Layout */
.app-container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.dashboard-layout {
    display: flex;
    height: 100vh;
    overflow: hidden;
    width: 100%;
}

.sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid #334155;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 40px;
    height: 100vh;
    overflow-y: auto;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 800;
    font-size: 1.5rem;
    color: var(--primary);
}

.nav-menu {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    text-decoration: none;
    color: var(--text-light);
    font-weight: 500;
    transition: all 0.3s ease;
    cursor: pointer;
}

.nav-item:hover, .nav-item.active {
    background: rgba(96, 113, 47, 0.1);
    color: var(--primary);
}

.nav-item i {
    width: 20px;
}

.sub-item {
    padding-left: 48px;
    font-size: 0.9rem;
    height: 40px;
}

.dropdown-content {
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    gap: 2px;
}

/* Content Area */
.content-area {
    flex: 1;
    padding: 32px 48px;
    width: 100%;
    height: 100vh;
    overflow-y: auto;
    transition: padding 0.3s ease;
}

@media (max-width: 768px) {
    .content-area {
        padding: 24px 20px;
    }
}

.top-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

.page-title h2 {
    font-size: 1.8rem;
    font-weight: 700;
}

.user-profile-small img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: 3px solid white;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

/* Auth Screens */
.auth-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #60712F 0%, #483C25 100%);
    padding: 20px;
}

.auth-card {
    background: var(--glass);
    backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    padding: 48px;
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 480px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
}

.flat-card {
    background: var(--surface);
    padding: 32px;
    border-radius: var(--radius-md);
    border: 1px solid #334155;
}

.auth-header {
    text-align: center;
    margin-bottom: 32px;
}

.auth-header h1 {
    font-size: 2rem;
    margin-bottom: 8px;
}

.form-group {
    margin-bottom: 24px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--text);
}

.form-input {
    width: 100%;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    background: #262626;
    border: 1px solid #404040;
    color: var(--text);
    outline: none;
    transition: all 0.3s;
    font-size: 1rem;
}

.form-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(96, 113, 47, 0.2);
}

.btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius-sm);
    border: none;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    font-size: 1rem;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.btn-primary {
    background: var(--primary);
    color: white;
}

.btn-primary:hover {
    background: var(--primary-dark);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

.btn-ghost {
    background: transparent;
    color: var(--primary);
}

/* Dashboard Tiles */
.grid-menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 24px;
}

.menu-card {
    background: var(--surface);
    padding: 32px;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow);
    transition: all 0.3s;
    cursor: pointer;
    border: 1px solid transparent;
}

.menu-card:hover {
    transform: translateY(-8px);
    border-color: var(--primary);
}

.card-icon {
    width: 60px;
    height: 60px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    font-size: 24px;
}

.bg-purple { background: rgba(158, 169, 63, 0.1); color: #9EA93F; } /* Artichoke */
.bg-blue { background: rgba(244, 240, 141, 0.1); color: #F4F08D; } /* Cauliflower */
.bg-pink { background: rgba(96, 113, 47, 0.1); color: #60712F; } /* Sorrel */

/* Table and Search */
.search-box {
    background: var(--surface);
    padding: 24px;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow);
    margin-bottom: 32px;
    border: 1px solid #334155;
    display: flex;
    gap: 16px;
}

.data-table-container {
    background: var(--surface);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow);
    border: 1px solid #334155;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: rgba(255, 255, 255, 0.03);
    text-align: left;
    padding: 16px 24px;
    font-weight: 700;
    color: var(--text-light);
    font-size: 0.85rem;
    text-transform: uppercase;
}

td {
    padding: 16px 24px;
    border-bottom: 1px solid #334155;
}

.badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
}

/* Animations */
[x-cloak] { display: none !important; }

/* Responsive */
/* Responsive Navigation */
.hamburger-btn {
    display: none;
    background: var(--surface);
    border: 1px solid #334155;
    color: var(--text);
    padding: 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    align-items: center;
    justify-content: center;
}

@media (max-width: 1024px) {
    .dashboard-layout {
        display: block;
        position: relative;
    }
    
    .sidebar {
        position: fixed;
        width: 280px;
        left: -280px;
        top: 0;
        bottom: 0;
        width: 280px;
        z-index: 50;
        transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: none;
    }
    
    .sidebar.mobile-open {
        left: 0;
        box-shadow: 20px 0 50px rgba(0,0,0,0.5);
    }

    .hamburger-btn {
        display: flex;
    }

    .sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(4px);
        z-index: 40;
        display: none;
    }

    .sidebar-overlay.active {
        display: block;
    }
}

@media (max-width: 640px) {
    .grid-menu {
        grid-template-columns: 1fr;
    }
    
    .top-nav {
        flex-direction: row;
        align-items: center;
        gap: 16px;
    }

    .page-title h2 {
        font-size: 1.4rem;
    }
}

/* PIN Input Styles */
.pin-box {
    width: 45px;
    height: 55px;
    border-radius: 10px;
    border: 2px solid #64748b !important; /* Visible slate border */
    background: #1a1a1a !important;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: #F4F08D;
    transition: all 0.2s ease;
}

.pin-box.active {
    border-color: #60712F !important;
    background: rgba(96, 113, 47, 0.2) !important;
    box-shadow: 0 0 15px rgba(96, 113, 47, 0.3);
    transform: translateY(-2px);
}
</style>
