<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BERBETA</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <?!= include('style'); ?>
</head>
<body x-data="app()" x-init="init()">
    <!-- Global Modals -->
    <div class="modal-overlay" 
         x-show="showEditModal" 
         x-cloak 
         x-transition
         style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(72, 60, 37, 0.4); backdrop-filter: blur(10px); z-index: 999999;">
        <div class="flat-card" 
             @click.away="showEditModal = false" 
             style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 450px; padding: 40px; box-shadow: 0 30px 60px -12px rgba(72, 60, 37, 0.2); border: 1px solid rgba(96, 113, 47, 0.05); margin: 0;">
            <div style="margin-bottom: 32px; text-align: center;">
                <div class="card-icon bg-blue" style="margin: 0 auto 16px;">
                    <i data-lucide="edit-3"></i>
                </div>
                <h3 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; color: var(--text);">Edit Data Arsip</h3>
                <p style="color: var(--text-light); font-size: 0.9rem;">Ubah informasi nomor atau nama pemilik arsip.</p>
            </div>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label>Nomor Arsip</label>
                <input type="text" class="form-input" x-model="editTargetNomor" placeholder="Masukkan nomor arsip baru..." @keydown.enter="saveEdit">
            </div>

            <div class="form-group">
                <label>Nama Pemilik</label>
                <input type="text" class="form-input" x-model="editTargetName" placeholder="Masukkan nama baru..." @keydown.enter="saveEdit">
            </div>
            
            <div style="display: flex; gap: 16px; margin-top: 40px;">
                <button class="btn" style="background: rgba(255,255,255,0.05); color: var(--text); flex: 1;" @click="showEditModal = false">BATAL</button>
                <button class="btn btn-primary" style="flex: 2;" @click="saveEdit">SIMPAN PERUBAHAN</button>
            </div>
        </div>
    </div>

    <!-- Custom Delete Confirmation Modal -->
    <div class="modal-overlay" 
         x-show="showDeleteModal" 
         x-cloak 
         x-transition
         style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(220, 38, 38, 0.1); backdrop-filter: blur(10px); z-index: 999999;">
        <div class="flat-card" 
             @click.away="showDeleteModal = false" 
             style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; padding: 40px; box-shadow: 0 30px 60px -12px rgba(220, 38, 38, 0.2); border: 1px solid rgba(220, 38, 38, 0.1); margin: 0; text-align: center;">
            <div style="margin-bottom: 24px;">
                <div class="card-icon" style="margin: 0 auto 16px; background: #fee2e2; color: #dc2626;">
                    <i data-lucide="alert-triangle"></i>
                </div>
                <h3 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; color: var(--text);">Hapus Arsip?</h3>
                <p style="color: var(--text-light); font-size: 0.9rem;">
                    Apakah Anda yakin ingin menghapus arsip <br>
                    <span style="font-weight: 700; color: #dc2626;" x-text="deleteTarget?.nomor"></span>?
                </p>
                <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 12px;">Tindakan ini tidak dapat dibatalkan.</p>
            </div>
            
            <div style="display: flex; gap: 12px;">
                <button class="btn" style="background: #f1f5f9; color: #475569; flex: 1;" @click="showDeleteModal = false">BATAL</button>
                <button class="btn" style="background: #dc2626; color: white; flex: 1;" @click="confirmDelete">HAPUS DATA</button>
            </div>
        </div>
    </div>
    
    <!-- Loading Overlay -->
    <div x-show="loading" class="loading-overlay" x-transition>
        <div class="loader"></div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container" x-show="toast.show" x-transition>
        <div :class="'toast toast-' + toast.type">
            <span x-text="toast.message"></span>
        </div>
    </div>

    <div class="app-container" x-cloak>
        <!-- Auth Screens -->
        <div x-show="!isLoggedIn || !isPinVerified">
            <?!= include('auth'); ?>
        </div>

        <!-- Main Dashboard -->
        <div class="dashboard-layout" x-show="isLoggedIn && isPinVerified">
            <div class="sidebar-overlay" :class="showMobileMenu ? 'active' : ''" @click="showMobileMenu = false"></div>
            <?!= include('sidebar'); ?>
            <div class="content-area">
                <header class="top-nav">
                    <div style="display: flex; align-items: center; gap: 16px;">
                        <button class="hamburger-btn" @click="showMobileMenu = true">
                            <i data-lucide="menu"></i>
                        </button>
                        <div class="page-title">
                            <h2 x-text="currentPageTitle"></h2>
                        </div>
                    </div>
                    <div class="user-profile-small">
                        <img :src="'https://ui-avatars.com/api/?name=' + user.email + '&background=6366f1&color=fff'" alt="Avatar">
                    </div>
                </header>

                <main class="main-content">
                    <div x-show="view === 'menu'">
                        <?!= include('dashboard'); ?>
                    </div>
                    <div x-show="view === 'input'">
                        <?!= include('input_arsip'); ?>
                    </div>
                    <div x-show="view === 'search'">
                        <?!= include('arsip'); ?>
                    </div>
                    <div x-show="view.startsWith('settings-')">
                        <?!= include('settings'); ?>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <?!= include('script'); ?>

</body>
</html>
