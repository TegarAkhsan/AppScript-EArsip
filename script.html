<script>
function app() {
    return {
        // State
        loading: false,
        isLoggedIn: localStorage.getItem('e_arsip_user') ? true : false,
        isPinVerified: localStorage.getItem('e_arsip_pin_verified') === 'true',
        view: 'menu',
        currentPageTitle: 'Menu Utama',
        showMobileMenu: false,
        user: JSON.parse(localStorage.getItem('e_arsip_user') || '{"email":""}'),
        toast: { show: false, message: '', type: 'info' },
        lastActivity: parseInt(localStorage.getItem('e_arsip_last_activity') || Date.now()),
        sessionTimeout: 30 * 60 * 1000, // 30 Minutes
        
        // Forms & Navigation
        authStep: 'login', // login, register, forgot, pin
        authForm: { email: '', password: '', pin: '', pinInput: '' },
        forgotForm: { email: '', otp: '', newPassword: '', confirmPassword: '' },
        forgotState: { otpSent: false, otpVerified: false },
        uploadForm: { nomor: '', namaPemilik: '', fileName: '', data: '', mimeType: '' },
        searchQuery: '',
        searchResults: [],
        
        // Modals
        showEditModal: false,
        editTarget: null,
        editTargetName: '',

        // Settings & Security
        settingsForm: { namaDesa: '', alamatDesa: '' },
        securityForm: { oldPin: '', newPin: '', confirmPin: '', oldPass: '', newPass: '', confirmPass: '' },

        init() {
            lucide.createIcons();
            
            // Sync settings form with user data
            if (this.isLoggedIn) {
                this.settingsForm.namaDesa = this.user.namaDesa || '';
                this.settingsForm.alamatDesa = this.user.alamatDesa || '';
                this.handleSearch();
            }

            // If logged in but not verified pin, show pin step
            if (this.isLoggedIn && !this.isPinVerified) {
                this.authStep = 'pin';
            }

            // Global Activity Tracker
            const updateEvts = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'];
            updateEvts.forEach(name => {
                document.addEventListener(name, () => {
                    this.lastActivity = Date.now();
                    localStorage.setItem('e_arsip_last_activity', this.lastActivity.toString());
                });
            });

            // Session check loop
            setInterval(() => {
                if (this.isLoggedIn && (Date.now() - this.lastActivity > this.sessionTimeout)) {
                    this.logout('Sesi berakhir karena tidak ada aktivitas.');
                }
            }, 10000);
        },

        showToast(message, type = 'info') {
            this.toast = { show: true, message, type };
            setTimeout(() => { this.toast.show = false; }, 3000);
        },

        setView(v, title) {
            this.view = v;
            this.currentPageTitle = title;
            this.showMobileMenu = false;
            setTimeout(() => lucide.createIcons(), 50);
            if (v === 'search' || v === 'menu') {
                this.searchQuery = ''; 
                this.handleSearch();
            }
        },

        // Auth Actions
        handleLogin() {
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.user = res.user;
                        this.isLoggedIn = true;
                        this.authStep = 'pin';
                        localStorage.setItem('e_arsip_user', JSON.stringify(res.user));
                        this.showToast('Login berhasil! Masukkan PIN.', 'success');
                        setTimeout(() => lucide.createIcons(), 50);
                    } else {
                        this.showToast(res.message, 'error');
                    }
                })
                .withFailureHandler(err => this.handleError(err))
                .login(this.authForm.email, this.authForm.password);
        },

        loginAdmin() {
            this.authForm.email = 'admin@earsip.com';
            this.authForm.password = 'admin123';
            this.handleLogin();
        },

        handlePinVerify() {
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.isPinVerified = true;
                        localStorage.setItem('e_arsip_pin_verified', 'true');
                        this.showToast('Akses diberikan.', 'success');
                        this.handleSearch();
                        setTimeout(() => lucide.createIcons(), 100);
                    } else {
                        this.showToast(res.message, 'error');
                        this.authForm.pinInput = '';
                    }
                })
                .verifyPin(this.user.email, this.authForm.pinInput);
        },

        pinAdmin() {
            this.authForm.pinInput = '123456';
            this.handlePinVerify();
        },

        logout(msg) {
            localStorage.removeItem('e_arsip_user');
            localStorage.removeItem('e_arsip_last_activity');
            localStorage.removeItem('e_arsip_pin_verified');
            this.isLoggedIn = false;
            this.isPinVerified = false;
            this.authStep = 'login';
            this.user = { email: '' };
            this.authForm = { email: '', password: '', pin: '', pinInput: '' };
            if (msg) this.showToast(msg, 'info');
        },

        // Archive Actions
        handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            this.uploadForm.fileName = file.name;
            this.uploadForm.mimeType = file.type;
            const reader = new FileReader();
            reader.onload = (f) => this.uploadForm.data = f.target.result.split(',')[1];
            reader.readAsDataURL(file);
        },

        handleUpload() {
            if (!this.uploadForm.data) return this.showToast('Pilih file PDF terlebih dahulu', 'error');
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.showToast('Dokumen tersimpan.', 'success');
                        this.uploadForm = { nomor: '', namaPemilik: '', fileName: '', data: '', mimeType: '' };
                        document.getElementById('file-upload').value = '';
                        this.setView('menu', 'Menu Utama');
                    } else {
                        this.showToast(res.message, 'error');
                    }
                })
                .uploadArsip(this.uploadForm);
        },

        // Edit Modal Actions
        openEditModal(item) {
            this.editTarget = item;
            this.editTargetName = item.namaPemilik;
            this.showEditModal = true;
        },

        saveEditName() {
            if (!this.editTargetName.trim()) return this.showToast('Nama tidak boleh kosong', 'error');
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.showToast('Nama diperbarui.', 'success');
                        this.showEditModal = false;
                        this.handleSearch();
                    } else {
                        this.showToast(res.message, 'error');
                    }
                })
                .withFailureHandler(err => this.handleError(err))
                .updateArsipName(this.editTarget.id, this.editTargetName);
        },

        handleSearch() {
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res && res.error) {
                        this.showToast(res.error, 'error');
                        this.searchResults = [];
                    } else {
                        this.searchResults = res || [];
                    }
                    setTimeout(() => lucide.createIcons(), 50);
                })
                .withFailureHandler(err => this.handleError(err))
                .searchArsip(this.searchQuery);
        },

        handlePrint(item) {
            window.open(item.printUrl, '_blank');
            this.showToast('Membuka dokumen...', 'info');
        },

        // Settings Actions
        handleUpdateProfile() {
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.user.namaDesa = this.settingsForm.namaDesa;
                        this.user.alamatDesa = this.settingsForm.alamatDesa;
                        localStorage.setItem('e_arsip_user', JSON.stringify(this.user));
                        this.showToast('Profil diperbarui.', 'success');
                    }
                })
                .updateProfile(this.user.email, this.settingsForm.namaDesa, this.settingsForm.alamatDesa);
        },

        handleChangePin() {
            if (this.securityForm.newPin !== this.securityForm.confirmPin) return this.showToast('PIN tidak cocok', 'error');
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.showToast('PIN diubah.', 'success');
                        this.securityForm.oldPin = this.securityForm.newPin = this.securityForm.confirmPin = '';
                    } else {
                        this.showToast(res.message, 'error');
                    }
                })
                .changePin(this.user.email, this.securityForm.oldPin, this.securityForm.newPin);
        },

        handleChangePassword() {
            if (this.securityForm.newPass !== this.securityForm.confirmPass) return this.showToast('Password tidak cocok', 'error');
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.showToast('Password diubah.', 'success');
                        this.securityForm.oldPass = this.securityForm.newPass = this.securityForm.confirmPass = '';
                    } else {
                        this.showToast(res.message, 'error');
                    }
                })
                .changePassword(this.user.email, this.securityForm.oldPass, this.securityForm.newPass);
        },

        formatDate(date) {
            if (!date) return '-';
            const d = new Date(date);
            return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
        }
    }
}
</script>
