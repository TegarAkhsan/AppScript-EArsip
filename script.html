<script>
function app() {
    return {
        // State
        loading: false,
        isLoggedIn: localStorage.getItem('e_arsip_user') ? true : false,
        isPinVerified: localStorage.getItem('e_arsip_pin_verified') === 'true',
        view: 'menu',
        currentPageTitle: 'Menu Utama',
        showMobileMenu: false,
        user: JSON.parse(localStorage.getItem('e_arsip_user') || '{"email":""}'),
        toast: { show: false, message: '', type: 'info' },
        lastActivity: parseInt(localStorage.getItem('e_arsip_last_activity') || Date.now()),
        sessionTimeout: 30 * 60 * 1000, // 30 Minutes
        
        // Forms & Navigation
        authStep: 'pin', // Hard default
        authForm: { email: '', password: '', pin: '', pinInput: '' },
        forgotForm: { email: '', otp: '', newPassword: '', confirmPassword: '' },
        forgotState: { otpSent: false, otpVerified: false },
        uploadForm: { nomor: '', namaPemilik: '', fileName: '', data: '', mimeType: '' },
        searchQuery: '',
        searchResults: [],
        
        // Modals
        showEditModal: false,
        editTarget: null,
        editTargetName: '',
        editTargetNomor: '',
        showDeleteModal: false,
        deleteTarget: null,
        showPermDeleteModal: false,
        permDeleteTarget: null,
        sortOrder: 'desc', // 'asc' or 'desc'
        trashItems: [],

        // Settings & Security
        settingsForm: { namaDesa: '', alamatDesa: '' },
        securityForm: { oldPin: '', newPin: '', confirmPin: '' },

        init() {
            lucide.createIcons();
            
            // Force logout if logged in as the old admin session
            if (this.isLoggedIn && this.user.email === 'admin@earsip.com') {
                this.logout('Sesi admin lama telah dinonaktifkan. Silakan masuk kembali.');
                return;
            }
            
            // Session Expiration Check on Load
            if (this.isLoggedIn && (Date.now() - this.lastActivity > this.sessionTimeout)) {
                this.logout('Sesi telah berakhir. Silakan login kembali.');
                return;
            }

            // Sync settings form with user data
            if (this.isLoggedIn) {
                this.settingsForm.namaDesa = this.user.namaDesa || '';
                this.settingsForm.alamatDesa = this.user.alamatDesa || '';
                this.handleSearch();
            }

            // Force PIN screen if not verified
            if (!this.isPinVerified) {
                this.authStep = 'pin';
            }

            // Global Activity Tracker
            const updateEvts = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'];
            updateEvts.forEach(name => {
                document.addEventListener(name, () => {
                    this.lastActivity = Date.now();
                    localStorage.setItem('e_arsip_last_activity', this.lastActivity.toString());
                });
            });

            // Session check loop
            setInterval(() => {
                if (this.isLoggedIn && (Date.now() - this.lastActivity > this.sessionTimeout)) {
                    this.logout('Sesi berakhir karena tidak ada aktivitas.');
                }
            }, 10000);
        },

        showToast(message, type = 'info') {
            this.toast = { show: true, message, type };
            setTimeout(() => { this.toast.show = false; }, 3000);
        },

        setView(v, title) {
            this.view = v;
            this.currentPageTitle = title;
            this.showMobileMenu = false;
            setTimeout(() => lucide.createIcons(), 50);
            if (v === 'search' || v === 'menu') {
                this.searchQuery = ''; 
                this.handleSearch();
            }
            if (v === 'trash') {
                this.handleGetTrash();
            }
        },

        // Auth Actions
        handleRegister() {
            if (!this.authForm.email || !this.authForm.password || !this.authForm.pin) {
                return this.showToast('Lengkapi semua data', 'error');
            }
            if (this.authForm.pin.length !== 6) {
                return this.showToast('PIN harus 6 digit', 'error');
            }
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.showToast('Pendaftaran berhasil! Silakan masukkan PIN.', 'success');
                        this.authStep = 'pin';
                        this.authForm.pin = '';
                        this.authForm.password = '';
                    } else {
                        this.showToast(res.message, 'error');
                    }
                })
                .withFailureHandler(err => this.handleError(err))
                .register(this.authForm.email, this.authForm.password, this.authForm.pin);
        },

        handlePinVerify() {
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.user = res.user;
                        this.isLoggedIn = true;
                        this.isPinVerified = true;
                        localStorage.setItem('e_arsip_user', JSON.stringify(res.user));
                        localStorage.setItem('e_arsip_pin_verified', 'true');
                        this.showToast('Akses diberikan.', 'success');
                        this.handleSearch();
                        setTimeout(() => lucide.createIcons(), 100);
                    } else {
                        this.showToast(res.message, 'error');
                        this.authForm.pinInput = '';
                    }
                })
                .withFailureHandler(err => this.handleError(err))
                .loginWithPin(this.authForm.pinInput);
        },

        logout(msg) {
            localStorage.removeItem('e_arsip_user');
            localStorage.removeItem('e_arsip_last_activity');
            localStorage.removeItem('e_arsip_pin_verified');
            this.isLoggedIn = false;
            this.isPinVerified = false;
            this.authStep = 'pin';
            this.user = { email: '' };
            this.authForm = { email: '', password: '', pin: '', pinInput: '' };
            if (msg) this.showToast(msg, 'info');
        },

        // Archive Actions
        handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Enforce strictly PDF files
            if (file.type !== 'application/pdf') {
                this.showToast('Hanya file PDF yang diperbolehkan!', 'error');
                e.target.value = '';
                this.uploadForm.fileName = '';
                this.uploadForm.mimeType = '';
                this.uploadForm.data = '';
                return;
            }

            // Enforce max size limit: 200KB
            if (file.size > 200 * 1024) {
                this.showToast('Ukuran PDF maksimal adalah 200KB', 'error');
                e.target.value = '';
                this.uploadForm.fileName = '';
                this.uploadForm.mimeType = '';
                this.uploadForm.data = '';
                return;
            }

            this.uploadForm.fileName = file.name;
            this.uploadForm.mimeType = file.type;
            const reader = new FileReader();
            reader.onload = (f) => this.uploadForm.data = f.target.result.split(',')[1];
            reader.readAsDataURL(file);
        },

        handleUpload() {
            if (!this.uploadForm.data) return this.showToast('Pilih file PDF terlebih dahulu', 'error');
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.showToast('Dokumen tersimpan.', 'success');
                        this.uploadForm = { nomor: '', namaPemilik: '', fileName: '', data: '', mimeType: '' };
                        document.getElementById('file-upload').value = '';
                        this.setView('menu', 'Menu Utama');
                    } else {
                        this.showToast(res.message, 'error');
                    }
                })
                .uploadArsip(this.uploadForm);
        },

        // Edit Modal Actions
        openEditModal(item) {
            this.editTarget = item;
            this.editTargetName = item.namaPemilik;
            this.editTargetNomor = item.nomor;
            this.showEditModal = true;
        },

        saveEdit() {
            if (!this.editTargetName.trim() || !this.editTargetNomor.trim()) {
                return this.showToast('Nomor dan Nama tidak boleh kosong', 'error');
            }
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.showToast('Arsip diperbarui.', 'success');
                        this.showEditModal = false;
                        this.handleSearch();
                    } else {
                        this.showToast(res.message, 'error');
                    }
                })
                .withFailureHandler(err => this.handleError(err))
                .updateArsip(this.editTarget.id, this.editTargetNomor, this.editTargetName);
        },

        handleDelete(item) {
            this.deleteTarget = item;
            this.showDeleteModal = true;
            setTimeout(() => lucide.createIcons(), 50);
        },

        confirmDelete() {
            this.showDeleteModal = false;
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.showToast(res.message || 'Arsip dipindahkan ke Sampah.', 'success');
                        this.handleSearch();
                    } else {
                        this.showToast(res.message, 'error');
                    }
                })
                .withFailureHandler(err => this.handleError(err))
                .deleteArsip(this.deleteTarget.id);
        },

        handleGetTrash() {
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    this.trashItems = res || [];
                    setTimeout(() => lucide.createIcons(), 50);
                })
                .withFailureHandler(err => this.handleError(err))
                .getTrashItems();
        },

        handleRestore(item) {
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.showToast('Arsip berhasil dipulihkan.', 'success');
                        this.handleGetTrash();
                    } else {
                        this.showToast(res.message, 'error');
                    }
                })
                .withFailureHandler(err => this.handleError(err))
                .restoreArsip(item.id);
        },

        handlePermDelete(item) {
            this.permDeleteTarget = item;
            this.showPermDeleteModal = true;
            setTimeout(() => lucide.createIcons(), 50);
        },

        confirmPermDelete() {
            this.showPermDeleteModal = false;
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.showToast('Arsip dihapus secara permanen.', 'success');
                        this.handleGetTrash();
                    } else {
                        this.showToast(res.message, 'error');
                    }
                })
                .withFailureHandler(err => this.handleError(err))
                .deletePermanently(this.permDeleteTarget.id);
        },

        sortSearchResults(key) {
            this.sortOrder = this.sortOrder === 'asc' ? 'desc' : 'asc';
            this.searchResults.sort((a, b) => {
                let valA = a[key].toString().toLowerCase();
                let valB = b[key].toString().toLowerCase();
                
                // Try numeric sort if both are numbers or strings representing numbers
                if (!isNaN(valA) && !isNaN(valB)) {
                    valA = parseFloat(valA);
                    valB = parseFloat(valB);
                }

                if (valA < valB) return this.sortOrder === 'asc' ? -1 : 1;
                if (valA > valB) return this.sortOrder === 'asc' ? 1 : -1;
                return 0;
            });
            this.showToast(`Urutan: ${this.sortOrder === 'asc' ? 'Terkecil' : 'Terbesar'}`, 'info');
        },

        handleSearch() {
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res && res.error) {
                        this.showToast(res.error, 'error');
                        this.searchResults = [];
                    } else {
                        this.searchResults = res || [];
                    }
                    setTimeout(() => lucide.createIcons(), 50);
                })
                .withFailureHandler(err => this.handleError(err))
                .searchArsip(this.searchQuery);
        },

        handlePrint(item) {
            window.open(item.printUrl, '_blank');
            this.showToast('Membuka dokumen...', 'info');
        },

        // Settings Actions
        handleUpdateProfile() {
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.user.namaDesa = this.settingsForm.namaDesa;
                        this.user.alamatDesa = this.settingsForm.alamatDesa;
                        localStorage.setItem('e_arsip_user', JSON.stringify(this.user));
                        this.showToast('Profil diperbarui.', 'success');
                    }
                })
                .updateProfile(this.user.email, this.settingsForm.namaDesa, this.settingsForm.alamatDesa);
        },

        handleChangePin() {
            if (this.securityForm.newPin !== this.securityForm.confirmPin) return this.showToast('PIN tidak cocok', 'error');
            this.loading = true;
            google.script.run
                .withSuccessHandler(res => {
                    this.loading = false;
                    if (res.success) {
                        this.showToast('PIN diubah.', 'success');
                        this.securityForm.oldPin = this.securityForm.newPin = this.securityForm.confirmPin = '';
                    } else {
                        this.showToast(res.message, 'error');
                    }
                })
                .changePin(this.user.email, this.securityForm.oldPin, this.securityForm.newPin);
        },

        formatDate(date) {
            if (!date) return '-';
            const d = new Date(date);
            return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' });
        },

        handleError(err) {
            this.loading = false;
            console.error('System Error:', err);
            this.showToast('Terjadi kesalahan sistem: ' + err.toString(), 'error');
        }
    }
}
</script>
