<div class="auth-wrapper">
    <!-- Branding outside the card -->
    <div class="logo-external" x-transition>
        <img src="https://lh3.googleusercontent.com/d/1KfTtZCBQNOFMyymy3DYImPUckJD5lqNp" alt="Logo BERBETA" style="height: 70px; width: auto; object-fit: contain;">
        <div class="logo-text">
            <h1>BERBETA</h1>
            <p>Berbek Berkas Tanah Digital</p>
        </div>
    </div>

    <!-- PIN Verification Screen (Primary Login) -->
    <div class="auth-card" x-show="authStep === 'pin'" x-transition>
        <div class="auth-header">
            <h1 style="font-size: 2.2rem; margin-bottom: 8px;">Masukkan PIN</h1>
            <p style="font-weight: 500; color: var(--primary);">Akses Sistem Digital</p>
        </div>
        
        <form @submit.prevent="handlePinVerify">
            <div class="form-group" style="text-align: center; position: relative; margin-bottom: 32px;">
                <div style="display: flex; gap: 12px; justify-content: center; margin-bottom: 24px;" @click="$refs.pinInput.focus()">
                    <div class="pin-box" :class="authForm.pinInput.length >= 1 ? 'active' : ''" x-text="authForm.pinInput[0] ? '●' : ''"></div>
                    <div class="pin-box" :class="authForm.pinInput.length >= 2 ? 'active' : ''" x-text="authForm.pinInput[1] ? '●' : ''"></div>
                    <div class="pin-box" :class="authForm.pinInput.length >= 3 ? 'active' : ''" x-text="authForm.pinInput[2] ? '●' : ''"></div>
                    <div class="pin-box" :class="authForm.pinInput.length >= 4 ? 'active' : ''" x-text="authForm.pinInput[3] ? '●' : ''"></div>
                    <div class="pin-box" :class="authForm.pinInput.length >= 5 ? 'active' : ''" x-text="authForm.pinInput[4] ? '●' : ''"></div>
                    <div class="pin-box" :class="authForm.pinInput.length >= 6 ? 'active' : ''" x-text="authForm.pinInput[5] ? '●' : ''"></div>
                </div>
                
                <input type="password" 
                       x-ref="pinInput"
                       maxlength="6" 
                       x-model="authForm.pinInput" 
                       inputmode="numeric"
                       autocomplete="off"
                       style="position: absolute; opacity: 0; inset: 0; width: 100%; height: 60px; cursor: pointer; z-index: 10;">
                
                <p style="font-size: 0.85rem; color: var(--text-light);">Masukkan 6 digit kode akses Anda</p>
            </div>
            
            <button type="submit" class="btn btn-primary" :disabled="authForm.pinInput.length < 6">MASUK KE SISTEM</button>
            
            <div style="margin-top: 20px; text-align: center;">
                <a href="#" @click.prevent="authStep = 'register'" style="color: var(--primary); font-weight: 700; text-decoration: none; font-size: 1rem;">
                    <i data-lucide="user-plus" style="width: 18px; vertical-align: middle; margin-right: 4px;"></i> DAFTAR AKUN BARU
                </a>
            </div>

            <button type="button" @click="pinAdmin()" class="btn btn-admin" style="margin-top: 24px; background: var(--primary-dark); color: white; width: 100%;">
                <i data-lucide="shield-check"></i> LOGIN CEPAT ADMIN
            </button>
        </form>
    </div>

    <!-- Register Screen -->
    <div class="auth-card" x-show="authStep === 'register'" x-transition>
        <div class="auth-header">
            <h1>Buat Akun</h1>
            <p>Daftarkan email, password dan PIN baru</p>
        </div>
        
        <form @submit.prevent="handleRegister">
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-input" x-model="authForm.email" required placeholder="nama@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-input" x-model="authForm.password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Buat PIN (6 Digit)</label>
                <input type="password" class="form-input" maxlength="6" x-model="authForm.pin" required placeholder="123456">
            </div>
            <button type="submit" class="btn btn-primary">DAFTAR</button>
            <button type="button" @click="authStep = 'pin'" class="btn btn-ghost" style="margin-top: 12px;">KEMBALI</button>
        </form>
    </div>
</div>
